<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VersusView Web</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <div id="splitLayout" class="split-layout">
        <section id="leftPane" class="left-pane">
          <section id="playerShell" class="player-shell card">
            <div class="view-mode-row">
              <div class="view-mode-tabs">
                <button id="compareModeTab" class="btn mode-tab active" type="button">動画比較</button>
                <button id="singleModeTab" class="btn mode-tab" type="button">単体チェック</button>
              </div>
              <div id="singleTargetRow" class="single-target-row is-hidden">
                <select id="singleTargetSelect">
                  <option value="left">左動画</option>
                  <option value="right">右動画</option>
                </select>
              </div>
            </div>
            <section id="videoGrid" class="video-grid">
              <article class="video-card card left-card">
                <input id="leftFile" type="file" accept="video/mp4" hidden />
                <div id="leftVideoWrap" class="video-wrap">
                  <video id="leftVideo" playsinline></video>
                  <div id="leftPlaceholder" class="placeholder">MP4動画を選択</div>
                </div>
                <p id="leftFilename" class="filename">未選択</p>
              </article>

              <article class="video-card card right-card">
                <input id="rightFile" type="file" accept="video/mp4" hidden />
                <div id="rightVideoWrap" class="video-wrap">
                  <video id="rightVideo" playsinline muted></video>
                  <div id="rightPlaceholder" class="placeholder">MP4動画を選択</div>
                </div>
                <p id="rightFilename" class="filename">未選択</p>
              </article>
            </section>

            <section class="controls player-bar">
              <div class="top-controls">
                <div class="time-box">
                  <input id="timeInput" type="text" value="00:00:00" />
                  <span id="durationLabel">/ 00:00:00</span>
                </div>
                <div class="transport">
                  <button id="stepBackBtn" class="btn icon-btn" type="button" title="コマ戻り">◀|</button>
                  <button id="playPauseBtn" class="btn btn-primary icon-btn play-btn" type="button" title="再生 / 停止">▶</button>
                  <button id="stepForwardBtn" class="btn icon-btn" type="button" title="コマ送り">|▶</button>
                </div>
                <div class="meta">
                  <span id="playStatus" class="status-badge">停止中</span>
                </div>
              </div>

              <div class="seek-row">
                <input id="seekSlider" type="range" min="0" max="1" step="0.001" value="0" />
                <span id="remainLabel" class="label-mono">-00:00:00</span>
              </div>
            </section>
          </section>

        </section>

        <div id="paneResizer" class="pane-resizer" role="separator" aria-orientation="vertical" title="ドラッグして左右幅を調整"></div>

        <section class="right-pane">
          <section class="comments card">
            <div class="comment-input card-lite">
              <div class="comment-input-head">
                <h3>コメント記入</h3>
                <span>Shift+Enterで追加</span>
              </div>
              <div class="comment-input-row">
                <div class="field grow">
                  <input id="authorInput" type="text" placeholder="記入者（例: 田中）" />
                </div>
                <div class="field grow">
                  <textarea id="commentInput" placeholder="修正ポイントを入力（改行: Enter / 追加: Shift+Enter）"></textarea>
                </div>
              </div>
            </div>

            <div class="sort-row">
              <span>並び順</span>
              <select id="sortType">
                <option value="updatedAt">更新日時</option>
                <option value="timeline">動画時間軸</option>
              </select>
              <select id="sortOrder">
                <option value="desc">降順</option>
                <option value="asc">昇順</option>
              </select>
              <span id="commentCount">コメント: 0</span>
            </div>

            <div id="commentsList" class="comments-list"></div>
            <div class="export-row">
              <button id="openExportOverlayBtn" class="btn" type="button">書き出し</button>
              <button id="importCommentsBtn" class="btn" type="button">読み込み</button>
              <input id="importCommentsFile" type="file" accept=".csv,.txt,text/csv,text/plain" hidden />
            </div>
          </section>
        </section>
      </div>
    </main>

    <div id="exportOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-panel">
        <div class="overlay-head">
          <h3>コメント書き出し</h3>
          <button id="closeExportOverlayBtn" class="btn" type="button">閉じる</button>
        </div>

        <div class="overlay-section">
          <p class="overlay-label">形式</p>
          <div class="overlay-options">
            <label><input type="radio" name="exportFormat" value="csv" checked /> CSV</label>
            <label><input type="radio" name="exportFormat" value="txt" /> TXT</label>
          </div>
        </div>

        <div class="overlay-section">
          <p class="overlay-label">書き出す項目</p>
          <div class="overlay-grid">
            <label><input type="checkbox" data-export-field="timecode" checked /> 動画時間</label>
            <label><input type="checkbox" data-export-field="seconds" checked /> 秒</label>
            <label><input type="checkbox" data-export-field="author" checked /> 記入者</label>
            <label><input type="checkbox" data-export-field="text" checked /> コメント</label>
            <label><input type="checkbox" data-export-field="updatedAt" checked /> 更新日時</label>
          </div>
        </div>

        <div class="overlay-section">
          <p class="overlay-label">保存場所</p>
          <div class="overlay-location">
            <label><input type="radio" name="exportLocationType" value="download" checked /> 通常ダウンロード</label>
            <label><input type="radio" name="exportLocationType" value="custom" /> 任意の保存先</label>
          </div>
          <div class="overlay-save">
            <button id="chooseExportLocationBtn" class="btn" type="button">保存場所を選択</button>
            <span id="exportLocationLabel" class="label-mono">未選択（未選択時は通常ダウンロード）</span>
          </div>
        </div>

        <div class="overlay-actions">
          <button id="runExportBtn" class="btn btn-primary" type="button">書き出し実行</button>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
